<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EventBuzz — Tech events, aggregated</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>EventBuzz</h1>
        <p class="tagline">Upcoming technology events, aggregated.</p>
      </div>
      <div id="auth-area">
        <button id="signin-btn" class="btn-auth">Sign In</button>
        <div id="user-info" hidden>
          <img id="user-avatar" src="" alt="" width="32" height="32" />
          <span id="user-name"></span>
          <button id="signout-btn" class="btn-auth btn-auth-ghost">Sign Out</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Auth modal -->
  <dialog id="auth-modal">
    <div class="modal-inner">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <h2>Sign in to EventBuzz</h2>
      <button class="btn-google" id="google-signin">
        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      <div class="divider"><span>or</span></div>
      <form id="auth-form">
        <input type="email"    id="auth-email"    placeholder="Email"    required autocomplete="username" />
        <input type="password" id="auth-password" placeholder="Password" required autocomplete="current-password" />
        <div id="auth-error"></div>
        <button type="submit" class="btn-submit">Sign In</button>
      </form>
    </div>
  </dialog>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="US" role="tab">United States</button>
    <button class="tab" data-tab="World" role="tab">World</button>
    <button class="tab" data-tab="Online" role="tab">Online</button>
  </nav>

  <div class="filters">
    <div class="pills" role="group" aria-label="Category filter">
      <button class="pill active" data-cat="">All</button>
      <button class="pill" data-cat="AI">AI</button>
      <button class="pill" data-cat="Cybersecurity">Cybersecurity</button>
      <button class="pill" data-cat="Developer">Developer</button>
      <button class="pill" data-cat="IT / Ops">IT / Ops</button>
      <button class="pill" data-cat="Cloud">Cloud</button>
      <button class="pill" data-cat="Data">Data</button>
      <button class="pill" data-cat="General">General</button>
    </div>

    <div class="city-wrap" id="city-wrap">
      <div class="city-input-row">
        <input
          type="text"
          id="city-input"
          placeholder="Search cities…"
          autocomplete="off"
          spellcheck="false"
        />
        <div id="city-chip" hidden>
          <span id="city-chip-name"></span>
          <button id="city-clear" aria-label="Clear city filter">✕</button>
        </div>
      </div>
      <ul id="city-suggestions" class="suggestions" hidden></ul>
    </div>
  </div>

  <main>
    <p id="status" class="status"></p>
    <ul id="events" class="events"></ul>
  </main>

  <footer>
    <small>Sources: Confs.tech · Devpost · Eventbrite · more coming</small>
  </footer>

  <script type="module" src="/app.js"></script>
</body>
</html>
