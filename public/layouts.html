<!doctype html>
<html lang="en" data-theme="dark" data-scheme="cyber">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>EventBuzz — Layout Concepts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --chrome-h: 48px;
    }

    /* ── Dark theme ──────────────────────────────────────────────────────── */
    :root, [data-theme="dark"] {
      --bg:    #0d0f17;
      --bg2:   #141720;
      --bg3:   #1c2032;
      --bg4:   #242844;
      --fg:    #e6eaf5;
      --fg2:   #8490aa;
      --fg3:   #4c5568;
      --border:  rgba(255,255,255,.065);
      --border2: rgba(255,255,255,.13);
      --hover:   rgba(255,255,255,.04);
      --sh-sm: 0 1px 3px rgba(0,0,0,.4);
      --sh:    0 2px 8px rgba(0,0,0,.45), 0 8px 28px rgba(0,0,0,.22);
      --sh-lg: 0 4px 16px rgba(0,0,0,.55), 0 20px 60px rgba(0,0,0,.3);
      --a-txt: #000;
    }
    /* ── Light theme ─────────────────────────────────────────────────────── */
    [data-theme="light"] {
      --bg:    #f4f6fc;
      --bg2:   #ffffff;
      --bg3:   #edf0f9;
      --bg4:   #e4e8f5;
      --fg:    #111827;
      --fg2:   #5c6882;
      --fg3:   #9ba3bc;
      --border:  rgba(99,102,141,.1);
      --border2: rgba(99,102,141,.22);
      --hover:   rgba(99,102,141,.05);
      --sh-sm: 0 1px 2px rgba(99,102,141,.07), 0 2px 5px rgba(99,102,141,.04);
      --sh:    0 2px 8px rgba(99,102,141,.09), 0 10px 30px rgba(99,102,141,.05);
      --sh-lg: 0 4px 16px rgba(99,102,141,.11), 0 20px 60px rgba(99,102,141,.06);
      --a-txt: #fff;
    }

    /* ── Schemes ─────────────────────────────────────────────────────────── */
    :root,[data-scheme="cyber"]   {--a:#ffd53f;--a-dim:rgba(255,213,63,.12);}
    [data-scheme="nebula"]        {--a:#a78bfa;--a-dim:rgba(167,139,250,.12);--a-txt:#fff;}
    [data-scheme="matrix"]        {--a:#34d399;--a-dim:rgba(52,211,153,.12);}
    [data-scheme="inferno"]       {--a:#fb923c;--a-dim:rgba(251,146,60,.12);}
    [data-scheme="arctic"]        {--a:#22d3ee;--a-dim:rgba(34,211,238,.12);}
    [data-scheme="slate"]         {--a:#60a5fa;--a-dim:rgba(96,165,250,.12);}
    [data-scheme="rose"]          {--a:#f43f5e;--a-dim:rgba(244,63,94,.12);--a-txt:#fff;}
    [data-scheme="gold"]          {--a:#f59e0b;--a-dim:rgba(245,158,11,.12);}
    [data-theme="light"][data-scheme="cyber"]  {--a:#b88a00;}
    [data-theme="light"][data-scheme="nebula"] {--a:#7c3aed;}
    [data-theme="light"][data-scheme="matrix"] {--a:#059669;}
    [data-theme="light"][data-scheme="inferno"]{--a:#c2500b;}
    [data-theme="light"][data-scheme="arctic"] {--a:#0891b2;}
    [data-theme="light"][data-scheme="slate"]  {--a:#1d4ed8;}
    [data-theme="light"][data-scheme="rose"]   {--a:#be123c;}
    [data-theme="light"][data-scheme="gold"]   {--a:#b45309;}

    /* ── Base ────────────────────────────────────────────────────────────── */
    body {
      margin:0; background:var(--bg); color:var(--fg);
      font-family:var(--font); font-size:14px; line-height:1.5;
      -webkit-font-smoothing:antialiased;
    }

    /* ── Chrome ──────────────────────────────────────────────────────────── */
    #chrome {
      position:fixed; top:0; left:0; right:0; height:var(--chrome-h);
      background:var(--bg2); border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:.5rem; padding:0 1rem;
      z-index:9999; overflow-x:auto;
    }
    #chrome-brand { font-weight:800; color:var(--a); font-size:.9rem; white-space:nowrap; flex-shrink:0; letter-spacing:-.02em; }
    #chrome-div   { width:1px; height:20px; background:var(--border); flex-shrink:0; }
    .cnav {
      background:none; border:1px solid var(--border); border-radius:6px;
      color:var(--fg2); cursor:pointer; font-size:.75rem; padding:.2rem .55rem;
      font-family:var(--font); transition:all .15s; flex-shrink:0;
    }
    .cnav:hover { border-color:var(--a); color:var(--a); }
    #chrome-name {
      min-width:148px; font-weight:600; color:var(--fg); font-size:.8rem;
      background:var(--bg3); border:1px solid var(--border); border-radius:6px;
      padding:.22rem .7rem; text-align:center; white-space:nowrap; flex-shrink:0;
    }
    #chrome-dots { display:flex; gap:.3rem; flex-shrink:0; }
    .cdot { width:7px; height:7px; border-radius:50%; background:var(--fg3); cursor:pointer; border:none; padding:0; transition:background .15s; }
    .cdot.on { background:var(--a); }
    #chrome-right { margin-left:auto; display:flex; align-items:center; gap:.35rem; flex-shrink:0; }
    .ctheme {
      background:none; border:1px solid var(--border); border-radius:6px; color:var(--fg2);
      cursor:pointer; font-size:.72rem; padding:.2rem .5rem; font-family:var(--font); transition:all .15s;
    }
    .ctheme.on { background:var(--a-dim); border-color:var(--a); color:var(--a); }
    .cscm { width:15px; height:15px; border-radius:50%; cursor:pointer; border:2.5px solid transparent; transition:border-color .15s; flex-shrink:0; }
    .cscm.on { border-color:var(--fg); }

    /* ── Preview pane ────────────────────────────────────────────────────── */
    #preview {
      position:fixed; top:var(--chrome-h); left:0; right:0; bottom:0;
      overflow-y:auto; background:var(--bg); font-family:var(--font);
      color:var(--fg); font-size:14px; line-height:1.5;
      -webkit-font-smoothing:antialiased;
    }

    /* ── Shared atoms ────────────────────────────────────────────────────── */
    .etitle { color:var(--fg); font-weight:600; text-decoration:none; letter-spacing:-.01em; transition:color .15s; }
    .etitle:hover { color:var(--a); }
    .ctag {
      border-radius:5px; font-size:.68rem; font-weight:600; letter-spacing:.01em; padding:.12rem .5rem;
      background:color-mix(in srgb,var(--c) 12%,transparent);
      border:1px solid color-mix(in srgb,var(--c) 22%,transparent);
      color:color-mix(in srgb,var(--c) 85%,var(--fg));
    }
    [data-theme="light"] .ctag { background:color-mix(in srgb,var(--c) 8%,transparent); color:color-mix(in srgb,var(--c) 70%,#000); }
    .badge { border-radius:5px; font-size:.68rem; font-weight:600; padding:.12rem .45rem; white-space:nowrap; }
    .badge.online    { background:#0c2a1a; color:#34d399; border:1px solid #0f3d26; }
    .badge.hackathon { background:#1a1040; color:#a78bfa; border:1px solid #2d1f6e; }
    [data-theme="light"] .badge.online    { background:#dcfce7; color:#15803d; border-color:#bbf7d0; }
    [data-theme="light"] .badge.hackathon { background:#f3e8ff; color:#7c3aed; border-color:#ddd6fe; }

    /* ════════════════════════════════════════════════════════════════════════
       1 — CLEAN (Luma-inspired: light, airy, refined)
    ════════════════════════════════════════════════════════════════════════ */
    .l1 { display:flex; min-height:100%; }
    .l1-sb {
      width:224px; flex-shrink:0; background:var(--bg2);
      border-right:1px solid var(--border); padding:1.5rem 1rem 1.5rem 1.25rem;
      display:flex; flex-direction:column; gap:1.5rem;
      position:sticky; top:0; height:calc(100vh - var(--chrome-h)); overflow-y:auto;
    }
    .l1-brand { display:flex; align-items:center; gap:.6rem; }
    .l1-bolt { font-size:1.4rem; line-height:1; color:var(--a); filter:drop-shadow(0 0 8px color-mix(in srgb,var(--a) 45%,transparent)); }
    .l1-bname { font-size:.95rem; font-weight:800; letter-spacing:-.03em; }
    .l1-btag  { font-size:.7rem; color:var(--fg2); margin-top:1px; }
    .l1-section { }
    .l1-lbl { font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--fg3); margin:0 0 .4rem .5rem; }
    .l1-nav { display:flex; flex-direction:column; gap:1px; }
    .l1-ni {
      align-items:center; background:none; border:none; border-radius:8px;
      color:var(--fg2); cursor:pointer; display:flex; font-family:var(--font);
      font-size:.82rem; font-weight:500; gap:.6rem; padding:.48rem .75rem;
      text-align:left; transition:all .15s; width:100%;
    }
    .l1-ni:hover:not(.on) { background:var(--hover); color:var(--fg); }
    .l1-ni.on { background:var(--a-dim); color:var(--a); font-weight:600; }
    .l1-ni-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; background:var(--cc,var(--fg3)); }
    .l1-sbfoot { margin-top:auto; border-top:1px solid var(--border); padding-top:1rem; }
    .l1-sblink {
      align-items:center; background:none; border:1px solid var(--border); border-radius:8px;
      color:var(--fg2); cursor:pointer; display:flex; font-family:var(--font); font-size:.8rem;
      gap:.45rem; padding:.45rem .75rem; transition:all .15s; width:100%;
    }
    .l1-sblink:hover { border-color:var(--a); color:var(--a); background:var(--a-dim); }
    .l1-main { flex:1; min-width:0; display:flex; flex-direction:column; }
    .l1-tabs {
      background:var(--bg2); border-bottom:1px solid var(--border);
      display:flex; gap:0; padding:0 1.5rem; position:sticky; top:0; z-index:10;
    }
    .l1-tab {
      background:none; border:none; border-bottom:2px solid transparent;
      color:var(--fg2); cursor:pointer; font-family:var(--font); font-size:.875rem;
      font-weight:500; margin-bottom:-1px; padding:.88rem 1.1rem; transition:all .15s;
    }
    .l1-tab.on { color:var(--a); border-bottom-color:var(--a); }
    .l1-body { padding:1.25rem 1.5rem; }
    .l1-count { color:var(--fg2); font-size:.78rem; margin:0 0 1rem; font-weight:500; }
    .l1-evs { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:.5rem; }
    .l1-ev {
      background:var(--bg2); border:1px solid var(--border); border-radius:12px;
      display:flex; align-items:flex-start; gap:1rem; padding:1rem 1.25rem;
      box-shadow:var(--sh-sm); transition:box-shadow .2s,transform .2s,border-color .2s; cursor:default;
    }
    .l1-ev:hover { box-shadow:var(--sh); border-color:var(--border2); transform:translateY(-1px); }
    .l1-dbadge {
      flex-shrink:0; text-align:center; min-width:44px;
      background:var(--a-dim); border-radius:10px; padding:.4rem .35rem;
    }
    .l1-dbadge .mo { font-size:.58rem; font-weight:700; text-transform:uppercase; color:var(--a); letter-spacing:.07em; }
    .l1-dbadge .dy { font-size:1.4rem; font-weight:800; color:var(--fg); line-height:1; letter-spacing:-.03em; }
    .l1-ec { flex:1; min-width:0; }
    .l1-head { display:flex; align-items:flex-start; gap:.5rem; justify-content:space-between; }
    .l1-title { font-size:.95rem; line-height:1.35; }
    .l1-meta { color:var(--fg2); font-size:.78rem; margin-top:.28rem; display:flex; flex-wrap:wrap; gap:.5rem; }
    .l1-desc { color:var(--fg2); font-size:.78rem; line-height:1.5; margin:.32rem 0 0; }
    .l1-tags { display:flex; flex-wrap:wrap; gap:.25rem; margin-top:.45rem; }

    /* ════════════════════════════════════════════════════════════════════════
       2 — LINEAR (Linear.app-inspired: deep dark, dense, keyboard-centric)
    ════════════════════════════════════════════════════════════════════════ */
    .l2 { display:flex; min-height:100%; background:var(--bg); }
    .l2-sb {
      width:210px; flex-shrink:0;
      background:color-mix(in srgb,var(--bg2) 60%,var(--bg));
      border-right:1px solid var(--border); padding:.75rem .6rem;
      display:flex; flex-direction:column;
      position:sticky; top:0; height:calc(100vh - var(--chrome-h)); overflow-y:auto;
    }
    .l2-brand { font-size:.88rem; font-weight:800; color:var(--a); letter-spacing:-.03em; padding:.4rem .7rem .8rem; display:block; }
    .l2-group-lbl { font-size:.6rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--fg3); padding:.5rem .7rem .2rem; }
    .l2-ni {
      align-items:center; background:none; border:none; border-radius:6px;
      color:var(--fg2); cursor:pointer; display:flex; font-family:var(--font);
      font-size:.8rem; gap:.55rem; padding:.38rem .7rem;
      text-align:left; transition:all .15s; width:100%; position:relative;
    }
    .l2-ni:hover:not(.on) { background:var(--hover); color:var(--fg); }
    .l2-ni.on { background:var(--hover); color:var(--fg); font-weight:500; }
    .l2-ni-ic { font-size:.9rem; width:16px; text-align:center; flex-shrink:0; opacity:.7; }
    .l2-ni-kbd { margin-left:auto; font-family:var(--mono); font-size:.6rem; color:var(--fg3); background:var(--bg3); border:1px solid var(--border); border-radius:3px; padding:1px 4px; }
    .l2-main { flex:1; min-width:0; }
    .l2-topbar {
      border-bottom:1px solid var(--border); display:flex; align-items:center;
      gap:.75rem; padding:.65rem 1.25rem; position:sticky; top:0; z-index:10;
      background:var(--bg);
    }
    .l2-title { font-size:.88rem; font-weight:600; letter-spacing:-.01em; }
    .l2-cnt { background:var(--bg3); border-radius:999px; color:var(--fg2); font-size:.68rem; padding:.1rem .5rem; font-weight:500; }
    .l2-filter {
      display:flex; gap:.3rem; margin-left:auto;
    }
    .l2-ftag {
      background:none; border:1px solid var(--border); border-radius:5px; color:var(--fg2);
      cursor:pointer; font-family:var(--font); font-size:.72rem; padding:.18rem .55rem; transition:all .15s;
    }
    .l2-ftag.on { background:var(--a-dim); border-color:var(--a); color:var(--a); }
    .l2-evs { list-style:none; margin:0; padding:0; }
    .l2-ev {
      align-items:center; border-bottom:1px solid var(--border);
      display:flex; gap:.75rem; padding:.62rem 1.25rem; transition:background .12s; cursor:pointer;
    }
    .l2-ev:hover { background:var(--hover); }
    .l2-chk { width:14px; height:14px; border-radius:4px; border:1.5px solid var(--border2); flex-shrink:0; }
    .l2-edate { font-family:var(--mono); font-size:.72rem; color:var(--fg3); white-space:nowrap; min-width:66px; }
    .l2-etitle { flex:1; font-size:.82rem; font-weight:500; color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .l2-eloc { font-size:.72rem; color:var(--fg2); white-space:nowrap; margin-right:.25rem; }
    .l2-ecats { display:flex; gap:.2rem; }
    .l2-ectag { border-radius:4px; font-size:.62rem; font-weight:600; padding:.08rem .38rem; background:color-mix(in srgb,var(--cc) 12%,transparent); color:color-mix(in srgb,var(--cc) 85%,#fff); border:1px solid color-mix(in srgb,var(--cc) 20%,transparent); }

    /* ════════════════════════════════════════════════════════════════════════
       3 — GRID (Magazine/Framer: 3-col cards, editorial header)
    ════════════════════════════════════════════════════════════════════════ */
    .l3-hdr {
      padding:2rem 1.75rem 1.5rem;
      background:linear-gradient(160deg,var(--bg2) 0%,var(--bg3) 100%);
      border-bottom:1px solid var(--border);
    }
    .l3-eyebrow { font-size:.68rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--a); margin:0 0 .5rem; }
    .l3-brand { font-size:2.1rem; font-weight:900; letter-spacing:-.045em; line-height:1; margin:0; }
    .l3-sub { color:var(--fg2); font-size:.88rem; margin:.4rem 0 1.25rem; }
    .l3-bar { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
    .l3-tab {
      background:none; border:1.5px solid var(--border); border-radius:999px;
      color:var(--fg2); cursor:pointer; font-family:var(--font); font-size:.8rem;
      font-weight:500; padding:.35rem .9rem; transition:all .15s;
    }
    .l3-tab.on { background:var(--a); border-color:var(--a); color:var(--a-txt,#000); font-weight:700; }
    .l3-cnt { margin-left:auto; font-size:.78rem; color:var(--fg2); }
    .l3-body { padding:1.5rem 1.75rem; }
    .l3-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
    .l3-card {
      background:var(--bg2); border:1px solid var(--border); border-radius:14px;
      overflow:hidden; box-shadow:var(--sh-sm); display:flex; flex-direction:column;
      transition:box-shadow .2s,transform .2s;
    }
    .l3-card:hover { box-shadow:var(--sh); transform:translateY(-3px); }
    .l3-card-top { height:4px; background:var(--cc,var(--a)); }
    .l3-card-body { padding:1rem 1.1rem; flex:1; display:flex; flex-direction:column; gap:.35rem; }
    .l3-cats { display:flex; gap:.25rem; flex-wrap:wrap; }
    .l3-title { font-size:.92rem; font-weight:700; line-height:1.3; letter-spacing:-.01em; }
    .l3-date { font-size:.75rem; color:var(--a); font-weight:600; }
    .l3-loc  { font-size:.75rem; color:var(--fg2); }
    .l3-desc { font-size:.75rem; color:var(--fg2); line-height:1.45; flex:1; }
    .l3-foot { display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:.4rem; }

    /* ════════════════════════════════════════════════════════════════════════
       4 — TIMELINE (Calendar/Cron-inspired: day-by-day with large dates)
    ════════════════════════════════════════════════════════════════════════ */
    .l4-hdr {
      background:var(--bg2); border-bottom:1px solid var(--border);
      padding:.9rem 1.5rem; display:flex; align-items:center; gap:1rem;
    }
    .l4-brand { font-size:1rem; font-weight:800; color:var(--a); letter-spacing:-.03em; }
    .l4-tabs { display:flex; gap:.35rem; margin-left:auto; }
    .l4-tab {
      background:none; border:1px solid var(--border); border-radius:7px;
      color:var(--fg2); cursor:pointer; font-family:var(--font); font-size:.78rem;
      font-weight:500; padding:.3rem .8rem; transition:all .15s;
    }
    .l4-tab.on { background:var(--a); border-color:var(--a); color:var(--a-txt,#000); font-weight:700; }
    .l4-body { padding:1.5rem 1.75rem; max-width:800px; }
    .l4-grp { display:grid; grid-template-columns:80px 1fr; gap:0 1.75rem; margin-bottom:1.75rem; }
    .l4-dcol { text-align:right; padding-top:.1rem; }
    .l4-wday { font-size:.62rem; font-weight:700; text-transform:uppercase; color:var(--a); letter-spacing:.08em; }
    .l4-mday { font-size:2rem; font-weight:900; color:var(--fg); line-height:1; letter-spacing:-.04em; }
    .l4-mon  { font-size:.7rem; color:var(--fg2); font-weight:500; margin-top:1px; }
    .l4-line {
      border-left:2px solid var(--border); padding-left:1.5rem; position:relative;
    }
    .l4-line::before {
      content:''; width:10px; height:10px; background:var(--a); border-radius:50%;
      position:absolute; left:-6px; top:6px;
      box-shadow:0 0 0 3px var(--bg), 0 0 0 5px var(--a-dim);
    }
    .l4-day-evs { display:flex; flex-direction:column; gap:.5rem; padding-bottom:.75rem; }
    .l4-ev {
      background:var(--bg2); border:1px solid var(--border); border-radius:12px;
      padding:.875rem 1.1rem; box-shadow:var(--sh-sm); transition:box-shadow .2s,border-color .2s;
    }
    .l4-ev:hover { box-shadow:var(--sh); border-color:var(--border2); }
    .l4-evhead { display:flex; align-items:flex-start; justify-content:space-between; gap:.5rem; }
    .l4-evmeta { color:var(--fg2); font-size:.78rem; margin:.25rem 0 .4rem; display:flex; flex-wrap:wrap; gap:.5rem; }

    /* ════════════════════════════════════════════════════════════════════════
       5 — TABLE (Notion/Airtable: clean data view)
    ════════════════════════════════════════════════════════════════════════ */
    .l5-hdr {
      background:var(--bg2); border-bottom:1px solid var(--border);
      padding:.85rem 1.5rem; display:flex; align-items:center; gap:1rem;
    }
    .l5-brand { font-size:.95rem; font-weight:800; color:var(--a); letter-spacing:-.02em; }
    .l5-tabs { display:flex; gap:.3rem; }
    .l5-tab {
      background:none; border:1px solid var(--border); border-radius:6px; color:var(--fg2);
      cursor:pointer; font-family:var(--font); font-size:.75rem; padding:.22rem .65rem; transition:all .15s;
    }
    .l5-tab.on { background:var(--a-dim); border-color:var(--a); color:var(--a); font-weight:600; }
    .l5-body { padding:.875rem 1.5rem; }
    .l5-toolbar { display:flex; align-items:center; gap:.4rem; margin-bottom:.875rem; flex-wrap:wrap; }
    .l5-pill {
      background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--fg2);
      cursor:pointer; font-family:var(--font); font-size:.72rem; padding:.2rem .55rem; transition:all .15s;
    }
    .l5-pill.on { background:var(--a-dim); border-color:var(--a); color:var(--a); font-weight:600; }
    .l5-tbl { width:100%; border-collapse:collapse; background:var(--bg2); border-radius:12px; overflow:hidden; box-shadow:var(--sh-sm); }
    .l5-tbl th {
      background:var(--bg3); border-bottom:1px solid var(--border);
      color:var(--fg3); font-size:.68rem; font-weight:700; letter-spacing:.08em;
      padding:.6rem 1rem; text-align:left; text-transform:uppercase; white-space:nowrap;
    }
    .l5-tbl td { border-bottom:1px solid var(--border); font-size:.82rem; padding:.65rem 1rem; vertical-align:middle; }
    .l5-tbl tr:last-child td { border-bottom:none; }
    .l5-tbl tr:hover td { background:var(--hover); }
    .l5-dcell { color:var(--fg2); font-family:var(--mono); font-size:.75rem; white-space:nowrap; }
    .l5-tcell a { color:var(--fg); font-weight:500; text-decoration:none; letter-spacing:-.01em; transition:color .15s; }
    .l5-tcell a:hover { color:var(--a); }
    .l5-lcell { color:var(--fg2); font-size:.78rem; }
    .l5-ccell { display:flex; gap:.25rem; flex-wrap:wrap; }
    .l5-ctag { border-radius:5px; font-size:.65rem; font-weight:600; padding:.1rem .45rem; background:color-mix(in srgb,var(--cc) 12%,transparent); color:color-mix(in srgb,var(--cc) 85%,#fff); border:1px solid color-mix(in srgb,var(--cc) 22%,transparent); }

    /* ════════════════════════════════════════════════════════════════════════
       6 — SPOTLIGHT (Luma dark: gradient hero, clean card feed)
    ════════════════════════════════════════════════════════════════════════ */
    .l6-hero {
      background:linear-gradient(135deg,
        color-mix(in srgb,var(--a) 18%,var(--bg)) 0%,
        color-mix(in srgb,var(--a) 6%,var(--bg)) 60%,
        var(--bg) 100%);
      padding:2.5rem 1.75rem 2rem;
      border-bottom:1px solid var(--border);
    }
    .l6-eyebrow { font-size:.65rem; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:var(--a); margin:0 0 .6rem; }
    .l6-brand { font-size:2rem; font-weight:900; letter-spacing:-.04em; line-height:1; margin:0; }
    .l6-sub { color:var(--fg2); font-size:.88rem; margin:.4rem 0 1.5rem; }
    .l6-bar { display:flex; gap:.4rem; flex-wrap:wrap; align-items:center; }
    .l6-tab {
      background:rgba(255,255,255,.06); backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.1); border-radius:999px;
      color:var(--fg2); cursor:pointer; font-family:var(--font); font-size:.8rem;
      font-weight:500; padding:.38rem .95rem; transition:all .15s;
    }
    .l6-tab.on { background:var(--a); border-color:var(--a); color:var(--a-txt,#000); font-weight:700; }
    .l6-sep { width:1px; height:16px; background:var(--border); }
    .l6-cat {
      background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:999px;
      color:var(--fg2); cursor:pointer; font-family:var(--font); font-size:.75rem;
      padding:.28rem .75rem; transition:all .15s;
    }
    .l6-cat.on { background:var(--a-dim); border-color:var(--a); color:var(--a); }
    .l6-body { padding:1.5rem 1.75rem; max-width:900px; }
    .l6-evs { display:flex; flex-direction:column; gap:.6rem; }
    .l6-ev {
      background:var(--bg2); border:1px solid var(--border); border-radius:14px;
      box-shadow:var(--sh-sm); display:flex; align-items:flex-start; gap:1.1rem;
      padding:1.1rem 1.25rem; transition:box-shadow .2s,transform .2s,border-color .2s;
    }
    .l6-ev:hover { box-shadow:var(--sh); border-color:var(--border2); transform:translateY(-1px); }
    .l6-dbadge {
      flex-shrink:0; text-align:center; width:46px;
      background:linear-gradient(160deg,var(--bg3),var(--bg4));
      border:1px solid var(--border); border-radius:10px; padding:.45rem .3rem;
    }
    .l6-dbadge .mo { font-size:.58rem; font-weight:700; text-transform:uppercase; color:var(--a); letter-spacing:.08em; }
    .l6-dbadge .dy { font-size:1.45rem; font-weight:900; color:var(--fg); line-height:1; letter-spacing:-.04em; }
    .l6-ec { flex:1; min-width:0; }
    .l6-head { display:flex; align-items:flex-start; gap:.5rem; justify-content:space-between; }
    .l6-title { font-size:.96rem; font-weight:700; letter-spacing:-.02em; line-height:1.3; }
    .l6-meta { color:var(--fg2); font-size:.78rem; margin:.3rem 0 .45rem; display:flex; flex-wrap:wrap; gap:.5rem; }
    .l6-tags { display:flex; flex-wrap:wrap; gap:.25rem; }

    /* ════════════════════════════════════════════════════════════════════════
       7 — MINIMAL (Are.na/HN: pure typography, no chrome)
    ════════════════════════════════════════════════════════════════════════ */
    .l7-hdr { max-width:720px; margin:0 auto; padding:1.75rem 1.5rem .5rem; display:flex; align-items:baseline; gap:1rem; }
    .l7-brand { font-size:1rem; font-weight:800; color:var(--a); letter-spacing:-.03em; }
    .l7-tabs { display:flex; gap:1.5rem; margin-left:auto; }
    .l7-tab { background:none; border:none; color:var(--fg2); cursor:pointer; font-family:var(--font); font-size:.82rem; font-weight:500; padding:0; transition:color .15s; }
    .l7-tab.on { color:var(--fg); font-weight:700; }
    .l7-filter { max-width:720px; margin:0 auto; padding:.75rem 1.5rem; display:flex; gap:1.25rem; border-bottom:1px solid var(--border); }
    .l7-pill { background:none; border:none; color:var(--fg3); cursor:pointer; font-family:var(--font); font-size:.78rem; padding:0; transition:color .15s; }
    .l7-pill.on { color:var(--a); font-weight:600; }
    .l7-evs { max-width:720px; margin:0 auto; padding:.5rem 1.5rem 2.5rem; }
    .l7-ev { display:flex; align-items:baseline; gap:.875rem; padding:.55rem 0; border-bottom:1px solid var(--border); }
    .l7-num { color:var(--fg3); font-size:.75rem; min-width:22px; text-align:right; flex-shrink:0; font-family:var(--mono); }
    .l7-dot { width:7px; height:7px; border-radius:50%; background:var(--cc,var(--a)); flex-shrink:0; margin-top:.35rem; align-self:flex-start; }
    .l7-body { flex:1; min-width:0; }
    .l7-title { font-size:.94rem; font-weight:600; letter-spacing:-.015em; }
    .l7-title:hover { color:var(--a); }
    .l7-sub { color:var(--fg2); font-size:.75rem; margin-top:.1rem; }

    /* ════════════════════════════════════════════════════════════════════════
       8 — GROUPED (Todoist/Things: time-bucket sections)
    ════════════════════════════════════════════════════════════════════════ */
    .l8-hdr {
      background:var(--bg2); border-bottom:1px solid var(--border); padding:0 1.5rem;
    }
    .l8-top { display:flex; align-items:center; gap:1rem; padding:.9rem 0; }
    .l8-brand { font-size:1.1rem; font-weight:900; letter-spacing:-.04em; }
    .l8-brand em { color:var(--a); font-style:normal; }
    .l8-tabs { display:flex; margin-left:auto; }
    .l8-tab {
      background:none; border:none; border-bottom:2px solid transparent;
      color:var(--fg2); cursor:pointer; font-family:var(--font); font-size:.82rem;
      font-weight:500; margin-bottom:-1px; padding:.7rem 1rem; transition:all .15s;
    }
    .l8-tab.on { color:var(--a); border-bottom-color:var(--a); }
    .l8-body { padding:1.25rem 1.5rem; max-width:860px; }
    .l8-sec { margin-bottom:2rem; }
    .l8-ghd {
      display:flex; align-items:center; gap:.75rem; margin-bottom:.75rem;
      font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--fg3);
    }
    .l8-ghd::after { content:''; flex:1; height:1px; background:var(--border); }
    .l8-gbadge { background:var(--a-dim); border-radius:999px; color:var(--a); font-style:normal; padding:.1rem .5rem; letter-spacing:0; font-size:.68rem; }
    .l8-evs { display:flex; flex-direction:column; gap:.4rem; }
    .l8-ev {
      background:var(--bg2); border:1px solid var(--border); border-radius:12px;
      box-shadow:var(--sh-sm); display:flex; gap:.875rem; padding:.875rem 1.1rem;
      transition:box-shadow .2s,border-color .2s;
    }
    .l8-ev:hover { box-shadow:var(--sh); border-color:var(--border2); }
    .l8-bar { width:3px; background:var(--cc,var(--a)); border-radius:3px; flex-shrink:0; align-self:stretch; min-height:18px; }
    .l8-ec { flex:1; min-width:0; }
    .l8-head { display:flex; align-items:flex-start; justify-content:space-between; gap:.5rem; }
    .l8-meta { color:var(--fg2); font-size:.78rem; margin:.2rem 0 .4rem; }

    /* ════════════════════════════════════════════════════════════════════════
       9 — WIDE CARDS (Vercel dashboard: spacious, large date, full info)
    ════════════════════════════════════════════════════════════════════════ */
    .l9-hdr {
      background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);
      border-bottom:1px solid var(--border); padding:1.5rem 2rem; display:flex; align-items:center; gap:1.5rem;
    }
    .l9-brand-wrap {}
    .l9-brand { font-size:1.5rem; font-weight:900; letter-spacing:-.04em; color:var(--a); }
    .l9-btag  { font-size:.75rem; color:var(--fg2); margin-top:1px; }
    .l9-tabs  { display:flex; gap:.4rem; margin-left:auto; }
    .l9-tab {
      background:none; border:1px solid var(--border); border-radius:8px; color:var(--fg2);
      cursor:pointer; font-family:var(--font); font-size:.8rem; font-weight:500;
      padding:.4rem .95rem; transition:all .15s;
    }
    .l9-tab.on { background:var(--a); border-color:var(--a); color:var(--a-txt,#000); font-weight:700; }
    .l9-pills { display:flex; flex-wrap:wrap; gap:.4rem; padding:.875rem 2rem; border-bottom:1px solid var(--border); }
    .l9-pill {
      background:var(--bg2); border:1px solid var(--border); border-radius:999px;
      color:var(--fg2); cursor:pointer; font-family:var(--font); font-size:.75rem;
      font-weight:500; padding:.28rem .8rem; transition:all .15s;
    }
    .l9-pill.on { background:var(--a); border-color:var(--a); color:var(--a-txt,#000); font-weight:700; }
    .l9-body { padding:1.5rem 2rem; max-width:1000px; }
    .l9-count { color:var(--fg2); font-size:.78rem; margin:0 0 1rem; font-weight:500; }
    .l9-evs { display:flex; flex-direction:column; gap:.65rem; }
    .l9-ev {
      background:var(--bg2); border:1px solid var(--border); border-radius:14px;
      box-shadow:var(--sh-sm); display:grid; grid-template-columns:88px 1fr;
      gap:0 1.5rem; padding:1.25rem 1.5rem; transition:box-shadow .2s,transform .2s,border-color .2s;
    }
    .l9-ev:hover { box-shadow:var(--sh); transform:translateY(-2px); border-color:var(--border2); }
    .l9-dcol { text-align:center; border-right:1px solid var(--border); padding-right:1.5rem; }
    .l9-mo { font-size:.65rem; font-weight:800; text-transform:uppercase; color:var(--a); letter-spacing:.1em; margin-top:2px; }
    .l9-dy { font-size:2.75rem; font-weight:900; color:var(--fg); line-height:1; letter-spacing:-.05em; }
    .l9-yr { font-size:.68rem; color:var(--fg2); font-weight:500; }
    .l9-ec {}
    .l9-head { display:flex; align-items:flex-start; justify-content:space-between; gap:.75rem; }
    .l9-title { font-size:1.05rem; font-weight:700; letter-spacing:-.02em; line-height:1.3; }
    .l9-meta { color:var(--fg2); font-size:.8rem; margin:.35rem 0 .5rem; display:flex; flex-wrap:wrap; gap:.6rem; }
    .l9-desc { color:var(--fg2); font-size:.82rem; line-height:1.55; margin-bottom:.6rem; }
    .l9-tags { display:flex; flex-wrap:wrap; gap:.3rem; }

    /* ════════════════════════════════════════════════════════════════════════
       10 — SPLIT PANE (Superhuman/email client: master+detail)
    ════════════════════════════════════════════════════════════════════════ */
    .l10 { display:flex; min-height:100%; }
    .l10-list {
      width:360px; flex-shrink:0; border-right:1px solid var(--border);
      display:flex; flex-direction:column; position:sticky; top:0;
      height:calc(100vh - var(--chrome-h)); overflow-y:auto;
    }
    .l10-list-hdr {
      padding:.75rem 1rem; border-bottom:1px solid var(--border);
      background:var(--bg2); position:sticky; top:0; z-index:5;
    }
    .l10-list-brand { font-size:.9rem; font-weight:800; color:var(--a); letter-spacing:-.02em; margin:0 0 .5rem; display:block; }
    .l10-tabs { display:flex; gap:0; }
    .l10-tab {
      background:none; border:none; border-bottom:2px solid transparent;
      color:var(--fg2); cursor:pointer; font-family:var(--font); font-size:.75rem;
      font-weight:500; margin-bottom:-1px; padding:.5rem .75rem; transition:all .15s;
    }
    .l10-tab.on { color:var(--a); border-bottom-color:var(--a); }
    .l10-rows { list-style:none; margin:0; padding:0; }
    .l10-row {
      border-bottom:1px solid var(--border); cursor:pointer;
      padding:.75rem 1rem; transition:background .12s;
    }
    .l10-row:hover { background:var(--hover); }
    .l10-row.sel { background:var(--a-dim); border-left:3px solid var(--a); }
    .l10-row-top { display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem; }
    .l10-row-title { font-size:.82rem; font-weight:600; color:var(--fg); letter-spacing:-.01em; line-height:1.3; flex:1; }
    .l10-row-date  { font-size:.68rem; color:var(--fg2); white-space:nowrap; font-family:var(--mono); flex-shrink:0; }
    .l10-row-meta  { color:var(--fg2); font-size:.72rem; margin-top:.2rem; }
    .l10-row-cats  { display:flex; gap:.2rem; margin-top:.3rem; }
    .l10-detail {
      flex:1; min-width:0; padding:2rem 2.5rem; overflow-y:auto;
      max-height:calc(100vh - var(--chrome-h));
    }
    .l10-det-badge {
      display:inline-flex; align-items:center; gap:.4rem;
      background:var(--a-dim); border:1px solid color-mix(in srgb,var(--a) 30%,transparent);
      border-radius:999px; padding:.3rem .75rem; margin-bottom:1.5rem;
    }
    .l10-det-badge .mo { font-size:.72rem; font-weight:700; text-transform:uppercase; color:var(--a); letter-spacing:.06em; }
    .l10-det-badge .dy { font-size:.88rem; font-weight:800; color:var(--fg); }
    .l10-det-title { font-size:1.5rem; font-weight:800; letter-spacing:-.03em; line-height:1.2; margin:0 0 .75rem; }
    .l10-det-meta  { display:flex; flex-wrap:wrap; gap:.75rem; color:var(--fg2); font-size:.82rem; margin-bottom:1.25rem; }
    .l10-det-sep   { height:1px; background:var(--border); margin:1.25rem 0; }
    .l10-det-desc  { color:var(--fg); font-size:.9rem; line-height:1.7; }
    .l10-det-tags  { display:flex; flex-wrap:wrap; gap:.35rem; margin-top:1.5rem; }
    .l10-det-link  {
      display:inline-flex; align-items:center; gap:.4rem; margin-top:1.75rem;
      background:var(--a); border-radius:8px; color:var(--a-txt,#000);
      font-size:.85rem; font-weight:700; padding:.6rem 1.25rem;
      text-decoration:none; letter-spacing:-.01em; transition:opacity .15s;
    }
    .l10-det-link:hover { opacity:.88; }
  </style>
</head>
<body>

<div id="chrome">
  <span id="chrome-brand">⚡ EventBuzz</span>
  <span id="chrome-div"></span>
  <button class="cnav" id="prev-btn">‹ Prev</button>
  <span id="chrome-name">1 — Clean</span>
  <button class="cnav" id="next-btn">Next ›</button>
  <div id="chrome-dots"></div>
  <div id="chrome-right">
    <button class="ctheme on" data-t="dark">🌙</button>
    <button class="ctheme" data-t="light">☀️</button>
    <div id="chrome-schemes"></div>
  </div>
</div>

<div id="preview"></div>

<script>
const EVS = [
  { title:"KubeCon + CloudNativeCon North America 2025", startDate:"2025-11-10", endDate:"2025-11-13", cityName:"Atlanta", countryCode:"US", categories:["Cloud","Developer"], eventType:"in-person", description:"The premier cloud-native conference hosted by the CNCF, bringing together thousands of engineers and leaders from across the industry to advance the state of cloud native computing.", url:"#" },
  { title:"Black Hat USA 2025", startDate:"2025-08-02", endDate:"2025-08-07", cityName:"Las Vegas", countryCode:"US", categories:["Cybersecurity"], eventType:"in-person", description:"The world's leading information security event, featuring cutting-edge research, community-driven summits, and intensive hands-on technical training from top security researchers.", url:"#" },
  { title:"AI Engineer World's Fair", startDate:"2025-06-10", endDate:"2025-06-12", cityName:"San Francisco", countryCode:"US", categories:["AI","Developer"], eventType:"in-person", description:"The largest gathering of engineers and technical leaders building AI products in production environments, from LLM inference to agentic systems.", url:"#" },
  { title:"AWS re:Invent 2025", startDate:"2025-12-01", endDate:"2025-12-05", cityName:"Las Vegas", countryCode:"US", categories:["Cloud"], eventType:"in-person", description:"Amazon Web Services' flagship annual conference featuring thousands of sessions, workshops, certification opportunities, and product announcements from the world's leading cloud provider.", url:"#" },
  { title:"DEF CON 33", startDate:"2025-08-07", endDate:"2025-08-10", cityName:"Las Vegas", countryCode:"US", categories:["Cybersecurity"], eventType:"in-person", description:"One of the world's largest and most notable hacker conventions, featuring technical talks, competitions, and workshops from the world's leading security researchers.", url:"#" },
  { title:"DataCloud World Congress", startDate:"2025-06-11", endDate:"2025-06-12", cityName:"Monaco", countryCode:"MC", categories:["Data","Cloud"], eventType:"in-person", description:"The leading global event for cloud infrastructure, data management, and digital transformation leaders from enterprise organizations worldwide.", url:"#" },
  { title:"HashiConf 2025", startDate:"2025-10-08", endDate:"2025-10-09", cityName:"Boston", countryCode:"US", categories:["IT / Ops","Cloud"], eventType:"in-person", description:"HashiCorp's annual user conference covering infrastructure automation, networking, and security with hands-on workshops and deep-dive sessions.", url:"#" },
  { title:"React Summit Online", startDate:"2025-06-13", endDate:"2025-06-13", cityName:"Online", countryCode:null, categories:["Developer"], eventType:"online", description:"The largest React conference worldwide, fully free to attend online with world-class speakers covering the latest in React, Next.js, and the broader ecosystem.", url:"#" },
];

const CC={AI:"#7c3aed",Cybersecurity:"#dc2626",Developer:"#2563eb","IT / Ops":"#0891b2",Cloud:"#0284c7",Data:"#d97706",General:"#6b7280"};
const MOS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const mo=d=>MOS[+d.split('-')[1]-1];
const dy=d=>+d.split('-')[2];
const yr=d=>d.split('-')[0];
const fc=ev=>CC[(ev.categories||[])[0]]||'#6b7280';
function fmtD(ev){
  if(!ev.endDate||ev.endDate===ev.startDate)return`${mo(ev.startDate)} ${dy(ev.startDate)}`;
  if(mo(ev.startDate)===mo(ev.endDate))return`${mo(ev.startDate)} ${dy(ev.startDate)}–${dy(ev.endDate)}`;
  return`${mo(ev.startDate)} ${dy(ev.startDate)} – ${mo(ev.endDate)} ${dy(ev.endDate)}`;
}
function fmtL(ev){if(!ev.cityName||ev.cityName==='Online')return'';return ev.countryCode&&ev.countryCode!=='US'?`${ev.cityName}, ${ev.countryCode}`:ev.cityName;}
function ctags(ev,c='ctag'){return(ev.categories||[]).map(x=>`<span class="${c}" style="--c:${CC[x]||'#6b7280'}">${x}</span>`).join('');}
function bdg(ev){if(ev.eventType==='online')return'<span class="badge online">Online</span>';if(ev.eventType==='hackathon')return'<span class="badge hackathon">Hackathon</span>';return'';}
function tabs(list,active,cls){return list.map((t,i)=>`<button class="${cls}${i===active?' on':''}">${t}</button>`).join('');}
function pills(list,active,cls){return list.map((t,i)=>`<button class="${cls}${i===active?' on':''}">${t}</button>`).join('');}
const CATS=['All','AI','Cybersecurity','Developer','IT / Ops','Cloud','Data','General'];
const TABS=['United States','World','Online'];

// ── Layouts ────────────────────────────────────────────────────────────────

function r1(){
  const ni=(label,dot,i)=>`<button class="l1-ni${i===0?' on':''}">${dot?`<span class="l1-ni-dot" style="--cc:${dot}"></span>`:''}<span>${label}</span></button>`;
  const evs=EVS.map(ev=>`<li class="l1-ev">
    <div class="l1-dbadge"><div class="mo">${mo(ev.startDate)}</div><div class="dy">${dy(ev.startDate)}</div></div>
    <div class="l1-ec">
      <div class="l1-head"><a class="etitle l1-title" href="#">${ev.title}</a>${bdg(ev)}</div>
      <div class="l1-meta">${fmtD(ev)}${fmtL(ev)?`<span>📍 ${fmtL(ev)}</span>`:''}</div>
      <p class="l1-desc">${ev.description.slice(0,130)}…</p>
      <div class="l1-tags">${ctags(ev)}</div>
    </div>
  </li>`).join('');
  return`<div class="l1">
    <aside class="l1-sb">
      <div class="l1-brand"><span class="l1-bolt">⚡</span><div><div class="l1-bname">EventBuzz</div><div class="l1-btag">Tech events, aggregated</div></div></div>
      <div class="l1-section"><p class="l1-lbl">Region</p><div class="l1-nav">${tabs(['United States','World','Online'],0,'l1-ni')}</div></div>
      <div class="l1-section"><p class="l1-lbl">Category</p>
        <div class="l1-nav">
          ${ni('All','',0)}
          ${Object.entries(CC).map(([k,v],i)=>ni(k,v,i+1)).join('')}
        </div>
      </div>
      <div class="l1-sbfoot"><button class="l1-sblink">⚙ Appearance</button></div>
    </aside>
    <div class="l1-main">
      <div class="l1-tabs">${tabs(TABS,0,'l1-tab')}</div>
      <div class="l1-body">
        <p class="l1-count">${EVS.length} upcoming events</p>
        <ul class="l1-evs">${evs}</ul>
      </div>
    </div>
  </div>`;
}

function r2(){
  const evs=EVS.map(ev=>`<li class="l2-ev">
    <div class="l2-chk"></div>
    <div class="l2-edate">${mo(ev.startDate)} ${dy(ev.startDate)}</div>
    <div class="l2-etitle">${ev.title}</div>
    <div class="l2-eloc">${fmtL(ev)||'Online'}</div>
    <div class="l2-ecats">${(ev.categories||[]).map(c=>`<span class="l2-ectag" style="--cc:${CC[c]||'#6b7280'}">${c}</span>`).join('')}</div>
    ${bdg(ev)}
  </li>`).join('');
  const navItem=(icon,label,kbd,on)=>`<button class="l2-ni${on?' on':''}">${icon?`<span class="l2-ni-ic">${icon}</span>`:''}<span>${label}</span>${kbd?`<span class="l2-ni-kbd">${kbd}</span>`:''}</button>`;
  return`<div class="l2">
    <aside class="l2-sb">
      <span class="l2-brand">⚡ EventBuzz</span>
      <span class="l2-group-lbl">Views</span>
      ${navItem('📋','All Events','G',true)}
      ${navItem('🇺🇸','United States','U',false)}
      ${navItem('🌍','World','W',false)}
      ${navItem('💻','Online','O',false)}
      <span class="l2-group-lbl">Categories</span>
      ${Object.entries(CC).map(([k,v])=>`<button class="l2-ni"><span class="l2-ni-ic" style="color:${v}">●</span><span>${k}</span></button>`).join('')}
    </aside>
    <div class="l2-main">
      <div class="l2-topbar">
        <span class="l2-title">All Events</span>
        <span class="l2-cnt">${EVS.length}</span>
        <div class="l2-filter">${pills(['All','AI','Cybersecurity','Developer','Cloud'],0,'l2-ftag')}</div>
      </div>
      <ul class="l2-evs">${evs}</ul>
    </div>
  </div>`;
}

function r3(){
  const cards=EVS.map(ev=>`<div class="l3-card">
    <div class="l3-card-top" style="--cc:${fc(ev)}"></div>
    <div class="l3-card-body">
      <div class="l3-cats">${ctags(ev)}</div>
      <a class="etitle l3-title" href="#">${ev.title}</a>
      <div class="l3-date">${fmtD(ev)}</div>
      ${fmtL(ev)?`<div class="l3-loc">📍 ${fmtL(ev)}</div>`:''}
      <p class="l3-desc">${ev.description.slice(0,100)}…</p>
      <div class="l3-foot">${bdg(ev)||''}</div>
    </div>
  </div>`).join('');
  return`<div class="l3-hdr">
    <p class="l3-eyebrow">Upcoming Events</p>
    <h1 class="l3-brand">EventBuzz</h1>
    <p class="l3-sub">The complete directory of tech conferences, summits &amp; hackathons.</p>
    <div class="l3-bar">${tabs(TABS,0,'l3-tab')}<span class="l3-cnt">${EVS.length} events</span></div>
  </div>
  <div class="l3-body"><div class="l3-grid">${cards}</div></div>`;
}

function r4(){
  const grps={};
  EVS.forEach(ev=>{if(!grps[ev.startDate])grps[ev.startDate]=[];grps[ev.startDate].push(ev);});
  const rows=Object.entries(grps).sort(([a],[b])=>a.localeCompare(b)).map(([d,evs])=>`
    <div class="l4-grp">
      <div class="l4-dcol">
        <div class="l4-wday">${DAYS[new Date(d+'T12:00:00').getDay()]}</div>
        <div class="l4-mday">${dy(d)}</div>
        <div class="l4-mon">${mo(d)} ${yr(d)}</div>
      </div>
      <div class="l4-line"><div class="l4-day-evs">
        ${evs.map(ev=>`<div class="l4-ev">
          <div class="l4-evhead"><a class="etitle" href="#" style="font-size:.95rem;font-weight:700;letter-spacing:-.02em">${ev.title}</a>${bdg(ev)}</div>
          <div class="l4-evmeta">${fmtL(ev)?`📍 ${fmtL(ev)}`:''} ${ev.endDate&&ev.endDate!==ev.startDate?`· ends ${mo(ev.endDate)} ${dy(ev.endDate)}`:''}</div>
          <div style="display:flex;flex-wrap:wrap;gap:.25rem">${ctags(ev)}</div>
        </div>`).join('')}
      </div></div>
    </div>`).join('');
  return`<div class="l4-hdr">
    <span class="l4-brand">⚡ EventBuzz</span>
    <div class="l4-tabs">${tabs(['US','World','Online'],0,'l4-tab')}</div>
  </div>
  <div class="l4-body">${rows}</div>`;
}

function r5(){
  const rows=EVS.map(ev=>`<tr>
    <td class="l5-dcell">${fmtD(ev)}</td>
    <td class="l5-tcell"><a href="#">${ev.title}</a></td>
    <td class="l5-lcell">${fmtL(ev)||'—'}</td>
    <td><div class="l5-ccell">${(ev.categories||[]).map(c=>`<span class="l5-ctag" style="--cc:${CC[c]||'#6b7280'}">${c}</span>`).join('')}</div></td>
    <td>${bdg(ev)||`<span style="color:var(--fg3);font-size:.72rem">In-person</span>`}</td>
  </tr>`).join('');
  return`<div class="l5-hdr">
    <span class="l5-brand">⚡ EventBuzz</span>
    <div class="l5-tabs">${tabs(['US','World','Online'],0,'l5-tab')}</div>
  </div>
  <div class="l5-body">
    <div class="l5-toolbar">${pills(CATS,0,'l5-pill')}<span style="margin-left:auto;color:var(--fg2);font-size:.75rem;font-weight:500">${EVS.length} events</span></div>
    <table class="l5-tbl">
      <thead><tr><th>Date</th><th>Event</th><th>Location</th><th>Categories</th><th>Type</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function r6(){
  const evs=EVS.map(ev=>`<div class="l6-ev">
    <div class="l6-dbadge"><div class="mo">${mo(ev.startDate)}</div><div class="dy">${dy(ev.startDate)}</div></div>
    <div class="l6-ec">
      <div class="l6-head"><a class="etitle l6-title" href="#">${ev.title}</a>${bdg(ev)}</div>
      <div class="l6-meta">${fmtD(ev)}${fmtL(ev)?`<span>📍 ${fmtL(ev)}</span>`:''}</div>
      <div class="l6-tags">${ctags(ev)}</div>
    </div>
  </div>`).join('');
  return`<div class="l6-hero">
    <p class="l6-eyebrow">Tech Events Directory</p>
    <h1 class="l6-brand">EventBuzz</h1>
    <p class="l6-sub">Upcoming conferences, summits, and hackathons — aggregated daily.</p>
    <div class="l6-bar">
      ${tabs(TABS,0,'l6-tab')}
      <span class="l6-sep"></span>
      ${pills(CATS.slice(0,5),0,'l6-cat')}
    </div>
  </div>
  <div class="l6-body"><div class="l6-evs">${evs}</div></div>`;
}

function r7(){
  const evs=EVS.map((ev,i)=>`<div class="l7-ev">
    <span class="l7-num">${i+1}</span>
    <span class="l7-dot" style="--cc:${fc(ev)}"></span>
    <div class="l7-body">
      <a class="etitle l7-title" href="#">${ev.title}</a>
      <div class="l7-sub">${fmtD(ev)}${fmtL(ev)?' · '+fmtL(ev):''}${ev.categories?' · '+(ev.categories||[]).join(', '):''}</div>
    </div>
  </div>`).join('');
  return`<div class="l7-hdr">
    <span class="l7-brand">⚡ EventBuzz</span>
    <div class="l7-tabs">${tabs(['US','World','Online'],0,'l7-tab')}</div>
  </div>
  <div class="l7-filter">${Object.keys(CC).map((k,i)=>`<button class="l7-pill${i===0?' on':''}">${k}</button>`).join('')}</div>
  <div class="l7-evs">${evs}</div>`;
}

function r8(){
  const buckets={'Coming Up':[],Summer:[],Fall:[],Winter:[]};
  EVS.forEach(ev=>{const m=+ev.startDate.split('-')[1];if(m<=6)buckets['Coming Up'].push(ev);else if(m<=8)buckets.Summer.push(ev);else if(m<=10)buckets.Fall.push(ev);else buckets.Winter.push(ev);});
  const secs=Object.entries(buckets).filter(([,e])=>e.length).map(([lbl,evs])=>`
    <div class="l8-sec">
      <div class="l8-ghd">${lbl} <em class="l8-gbadge">${evs.length}</em></div>
      <div class="l8-evs">${evs.map(ev=>`<div class="l8-ev">
        <div class="l8-bar" style="--cc:${fc(ev)}"></div>
        <div class="l8-ec">
          <div class="l8-head"><a class="etitle" href="#" style="font-size:.9rem;font-weight:700;letter-spacing:-.015em">${ev.title}</a>${bdg(ev)}</div>
          <div class="l8-meta">${fmtD(ev)}${fmtL(ev)?' · 📍 '+fmtL(ev):''}</div>
          <div style="display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.35rem">${ctags(ev)}</div>
        </div>
      </div>`).join('')}</div>
    </div>`).join('');
  return`<div class="l8-hdr">
    <div class="l8-top">
      <span class="l8-brand">Event<em>Buzz</em></span>
      <div class="l8-tabs">${tabs(TABS,0,'l8-tab')}</div>
    </div>
  </div>
  <div class="l8-body">${secs}</div>`;
}

function r9(){
  const evs=EVS.map(ev=>`<div class="l9-ev">
    <div class="l9-dcol">
      <div class="l9-mo">${mo(ev.startDate)}</div>
      <div class="l9-dy">${dy(ev.startDate)}</div>
      <div class="l9-yr">${yr(ev.startDate)}</div>
    </div>
    <div class="l9-ec">
      <div class="l9-head"><a class="etitle l9-title" href="#">${ev.title}</a>${bdg(ev)}</div>
      <div class="l9-meta">${ev.endDate&&ev.endDate!==ev.startDate?`<span>→ ${mo(ev.endDate)} ${dy(ev.endDate)}</span>`:''} ${fmtL(ev)?`<span>📍 ${fmtL(ev)}</span>`:''}</div>
      <p class="l9-desc">${ev.description}</p>
      <div class="l9-tags">${ctags(ev)}</div>
    </div>
  </div>`).join('');
  return`<div class="l9-hdr">
    <div class="l9-brand-wrap"><div class="l9-brand">⚡ EventBuzz</div><div class="l9-btag">Tech events, aggregated</div></div>
    <div class="l9-tabs">${tabs(TABS,0,'l9-tab')}</div>
  </div>
  <div class="l9-pills">${pills(CATS,0,'l9-pill')}</div>
  <div class="l9-body">
    <p class="l9-count">${EVS.length} upcoming events</p>
    <div class="l9-evs">${evs}</div>
  </div>`;
}

let selIdx=0;
function r10(){
  const ev=EVS[selIdx];
  const rows=EVS.map((e,i)=>`<li class="l10-row${i===selIdx?' sel':''}" data-idx="${i}">
    <div class="l10-row-top">
      <span class="l10-row-title">${e.title}</span>
      <span class="l10-row-date">${mo(e.startDate)} ${dy(e.startDate)}</span>
    </div>
    <div class="l10-row-meta">${fmtL(e)||'Online'}</div>
    <div class="l10-row-cats">${(e.categories||[]).map(c=>`<span class="l2-ectag" style="--cc:${CC[c]||'#6b7280'}">${c}</span>`).join('')}</div>
  </li>`).join('');
  return`<div class="l10">
    <div class="l10-list">
      <div class="l10-list-hdr">
        <span class="l10-list-brand">⚡ EventBuzz</span>
        <div class="l10-tabs">${tabs(TABS,0,'l10-tab')}</div>
      </div>
      <ul class="l10-rows">${rows}</ul>
    </div>
    <div class="l10-detail">
      <div class="l10-det-badge"><span class="mo">${mo(ev.startDate)}</span><span class="dy">${dy(ev.startDate)}, ${yr(ev.startDate)}</span></div>
      <h1 class="l10-det-title">${ev.title}</h1>
      <div class="l10-det-meta">
        <span>📅 ${fmtD(ev)}</span>
        ${fmtL(ev)?`<span>📍 ${fmtL(ev)}</span>`:''}
        ${bdg(ev)||'<span>In-person</span>'}
      </div>
      <div class="l10-det-sep"></div>
      <p class="l10-det-desc">${ev.description}</p>
      <div class="l10-det-tags">${ctags(ev)}</div>
      <a class="l10-det-link" href="#">View Event →</a>
    </div>
  </div>`;
}

// ── Chrome + init ──────────────────────────────────────────────────────────
const LAYOUTS=[
  {name:'Clean',           fn:r1},
  {name:'Linear Dark',     fn:r2},
  {name:'Magazine Grid',   fn:r3},
  {name:'Timeline',        fn:r4},
  {name:'Data Table',      fn:r5},
  {name:'Spotlight',       fn:r6},
  {name:'Minimal',         fn:r7},
  {name:'Grouped',         fn:r8},
  {name:'Wide Cards',      fn:r9},
  {name:'Split Pane',      fn:r10},
];

let cur=0;
const H=document.documentElement;
const preview=document.getElementById('preview');
const chromeName=document.getElementById('chrome-name');
const dotsEl=document.getElementById('chrome-dots');

LAYOUTS.forEach((_,i)=>{
  const d=document.createElement('button');
  d.className='cdot'+(i===0?' on':'');
  d.title=LAYOUTS[i].name;
  d.addEventListener('click',()=>go(i));
  dotsEl.appendChild(d);
});

[{id:'cyber',c:'#ffd53f'},{id:'nebula',c:'#a78bfa'},{id:'matrix',c:'#34d399'},
 {id:'inferno',c:'#fb923c'},{id:'arctic',c:'#22d3ee'},{id:'slate',c:'#60a5fa'},
 {id:'rose',c:'#f43f5e'},{id:'gold',c:'#f59e0b'}].forEach(s=>{
  const b=document.createElement('button');
  b.className='cscm'+(s.id==='cyber'?' on':'');
  b.style.background=s.c; b.title=s.id;
  b.addEventListener('click',()=>{
    H.dataset.scheme=s.id;
    document.querySelectorAll('.cscm').forEach(x=>x.classList.toggle('on',x.title===s.id));
  });
  document.getElementById('chrome-schemes').appendChild(b);
});

function go(i){
  cur=i; selIdx=0;
  preview.innerHTML=LAYOUTS[i].fn();
  preview.scrollTop=0;
  chromeName.textContent=`${i+1} — ${LAYOUTS[i].name}`;
  dotsEl.querySelectorAll('.cdot').forEach((d,j)=>d.classList.toggle('on',j===i));
  if(i===9) bindSplitPane();
}

function bindSplitPane(){
  preview.querySelectorAll('.l10-row').forEach(row=>{
    row.addEventListener('click',()=>{
      selIdx=+row.dataset.idx;
      go(9);
    });
  });
}

document.getElementById('prev-btn').addEventListener('click',()=>go((cur-1+LAYOUTS.length)%LAYOUTS.length));
document.getElementById('next-btn').addEventListener('click',()=>go((cur+1)%LAYOUTS.length));
document.querySelectorAll('[data-t]').forEach(b=>{
  b.addEventListener('click',()=>{
    H.dataset.theme=b.dataset.t;
    document.querySelectorAll('[data-t]').forEach(x=>x.classList.toggle('on',x===b));
  });
});

go(0);
</script>
</body>
</html>
