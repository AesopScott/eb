name: Deploy Firebase (EventBuzz)

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-firebase.yml'
  workflow_dispatch:

concurrency:
  group: deploy-firebase-eb
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install functions deps
        run: npm ci
        working-directory: functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Grant deploy SA Secret Manager access
        run: |
          DEPLOY_SA=$(gcloud config get-value account)
          echo "Deploy SA: $DEPLOY_SA"
          for SECRET in EVENTBRITE_API_KEY BRAVE_API_KEY; do
            gcloud secrets add-iam-policy-binding "$SECRET" \
              --project=eventbuzz-3a58f \
              --member="serviceAccount:${DEPLOY_SA}" \
              --role="roles/secretmanager.secretVersionManager" \
              --condition=None 2>&1 || echo "Warning: could not grant IAM on $SECRET (may already exist or lack permission)"
          done

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy functions + firestore
        run: firebase deploy --only functions,firestore --project eventbuzz-3a58f --non-interactive --force
